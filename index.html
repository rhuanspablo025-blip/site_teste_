<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nosso Universo: 15 Anos ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,600&family=Montserrat:wght@200;400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <h2 class="pinyon">Carregando o Universo...</h2>
            <div class="progress-bar"><div id="progress"></div></div>
        </div>
    </div>

    <div id="ui">
        <div class="top-bar">
            <span id="phase-num">FASE 01</span>
            <div class="line"></div>
        </div>

        <div class="center-content">
            <h1 id="main-text" class="blur-in">O início de tudo...</h1>
        </div>

        <div class="bottom-bar">
            <button id="next-btn">EXPLORAR PRÓXIMA MEMÓRIA</button>
        </div>
    </div>

    <canvas id="webgl"></canvas>

    <audio id="bg-music" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
